<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaSignal Pro Cockpit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        .card { background-color: #0f0f0f; border: 1px solid #1f1f1f; border-radius: 8px; }
        
        .btn-risk { 
            flex: 1; min-width: 28px; height: 32px; font-size: 10px; font-weight: 800; border-radius: 4px; 
            border: 1px solid #222; transition: all 0.2s; color: #444; background: transparent;
        }
        
        .active-buy { background-color: #10b981 !important; color: white !important; border-color: #10b981 !important; box-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }
        .active-dca { background-color: #3b82f6 !important; color: white !important; border-color: #3b82f6 !important; box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
        .active-sell { background-color: #ef4444 !important; color: white !important; border-color: #ef4444 !important; box-shadow: 0 0 10px rgba(239, 68, 68, 0.2); }
        
        #chartWrapper { min-height: 400px; position: relative; width: 100%; flex: 1; }
        @media (min-width: 1024px) { body { overflow: hidden; height: 100vh; } }
    </style>
</head>
<body class="bg-black">
    <nav class="h-14 border-b border-gray-900 flex items-center justify-between px-4 bg-black shrink-0">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 px-2 py-1 rounded text-xs font-black italic text-white">AS</div>
            <h2 class="text-[10px] font-bold tracking-widest text-gray-500 uppercase">AlphaSignal Cockpit</h2>
        </div>
        <select id="tickerSelect" class="bg-gray-900 border border-gray-800 text-[10px] font-bold uppercase p-1.5 rounded outline-none cursor-pointer text-white">
            <option value="SPY">SPY</option>
            <option value="QQQ">QQQ</option>
        </select>
    </nav>

    <main class="flex-1 flex flex-col lg:flex-row overflow-y-auto lg:overflow-hidden">
        
        <div class="w-full lg:w-[420px] p-4 lg:p-8 bg-[#080808] overflow-y-auto border-b lg:border-b-0 lg:border-r border-gray-900 shrink-0">
            
            <div class="card p-6 mb-4">
                <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest mb-2">Market State</p>
                <div id="price" class="text-4xl lg:text-5xl font-black tracking-tighter mb-1">$0.00</div>
                <div id="riskDisplay" class="text-xs font-bold text-gray-400 mb-4">Risk: 0/10</div>
                <div id="risk-status" class="py-2 px-4 rounded text-center text-[9px] font-black uppercase bg-gray-900 text-gray-600 tracking-widest">Initializing...</div>
            </div>

            <div class="card p-6 mb-4">
                <h3 class="text-[9px] font-bold text-gray-500 uppercase tracking-widest mb-6 italic">Strategy Sandbox</h3>
                <div class="space-y-6">
                    <div>
                        <span class="text-[8px] font-black text-emerald-500 uppercase block mb-3 tracking-widest">Heavy Buy Range</span>
                        <div id="buyRow" class="flex gap-1 justify-between"></div>
                    </div>
                    <div>
                        <span class="text-[8px] font-black text-blue-500 uppercase block mb-3 tracking-widest">DCA Range</span>
                        <div id="dcaRow" class="flex gap-1 justify-between"></div>
                    </div>
                    <div>
                        <span class="text-[8px] font-black text-red-500 uppercase block mb-3 tracking-widest">Sell Signal Range</span>
                        <div id="sellRow" class="flex gap-1 justify-between"></div>
                    </div>
                </div>
            </div>
            
            <div class="card p-6 border-dashed border-gray-800">
                <p class="text-[9px] font-bold text-gray-500 uppercase mb-4 tracking-widest">Email Alerts</p>
                <input type="email" id="emailInput" placeholder="Enter email..." class="w-full bg-black border border-gray-800 p-2.5 rounded text-xs mb-3 outline-none text-white">
                <button onclick="alert('Settings Saved!')" class="w-full bg-white text-black font-black text-[9px] uppercase py-3 rounded hover:bg-gray-200 transition">Enable Notifications</button>
            </div>
        </div>

        <div class="flex-1 p-4 lg:p-8 flex flex-col min-h-[450px] lg:min-h-0 bg-black">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xs font-black uppercase text-gray-500 tracking-widest">Historical Signal Analysis</h3>
                <div class="flex gap-4 text-[8px] font-bold text-gray-600 uppercase tracking-tighter">
                    <span><span class="text-emerald-500">●</span> Buy</span>
                    <span><span class="text-blue-500">●</span> DCA</span>
                    <span><span class="text-red-500">●</span> Sell</span>
                </div>
            </div>
            <div id="chartWrapper">
                <canvas id="marketChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://zifpotfvosfvxwcuxkct.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InppZnBvdGZ2b3Nmdnh3Y3V4a2N0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNzE5MjgsImV4cCI6MjA5MTk0NzkyOH0.mZ2Ngng0ulUDjfK57SPYhds8wD1g4qfxVsWzzOD1p1o'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let chartInstance = null;
        let globalMarketData = [];
        let strategies = { buy: [1, 2, 3], dca: [4, 5, 6, 7], sell: [8, 9, 10] };

        function createButtons() {
            ['buy', 'dca', 'sell'].forEach(cat => {
                const container = document.getElementById(cat + 'Row');
                if (!container) return;
                container.innerHTML = '';
                for (let i = 1; i <= 10; i++) {
                    const btn = document.createElement('button');
                    btn.innerText = i;
                    const isActive = strategies[cat].includes(i);
                    btn.className = `btn-risk ${isActive ? 'active-' + cat : ''}`;
                    btn.onclick = () => toggleRisk(cat, i);
                    container.appendChild(btn);
                }
            });
        }

        function toggleRisk(cat, risk) {
            const alreadyInThisCategory = strategies[cat].includes(risk);
            strategies.buy = strategies.buy.filter(r => r !== risk);
            strategies.dca = strategies.dca.filter(r => r !== risk);
            strategies.sell = strategies.sell.filter(r => r !== risk);
            if (!alreadyInThisCategory) {
                strategies[cat].push(risk);
            }
            createButtons();
            updateUI();
        }

        async function init() {
            createButtons();
            const { data, error } = await supabaseClient
                .from('market_data')
                .select('*')
                .order('created_at', { ascending: true });

            if (data) {
                globalMarketData = data;
                updateUI();
            }
        }

        function updateUI() {
            if (globalMarketData.length === 0) return;
            const latest = globalMarketData[globalMarketData.length - 1];
            
            document.getElementById('price').innerText = `$${latest.price.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('riskDisplay').innerText = `Risk Level: ${latest.risk_level}/10`;
            
            const statusEl = document.getElementById('risk-status');
            if (strategies.sell.includes(latest.risk_level)) {
                statusEl.innerText = "SIGNAL: SELL"; 
                statusEl.className = "py-2 px-4 rounded text-center text-[9px] font-black uppercase bg-red-900/30 text-red-500 tracking-widest";
            } else if (strategies.buy.includes(latest.risk_level)) {
                statusEl.innerText = "SIGNAL: HEAVY BUY"; 
                statusEl.className = "py-2 px-4 rounded text-center text-[9px] font-black uppercase bg-emerald-900/30 text-emerald-500 tracking-widest";
            } else if (strategies.dca.includes(latest.risk_level)) {
                statusEl.innerText = "SIGNAL: DCA"; 
                statusEl.className = "py-2 px-4 rounded text-center text-[9px] font-black uppercase bg-blue-900/30 text-blue-500 tracking-widest";
            } else {
                statusEl.innerText = "NO SIGNAL"; 
                statusEl.className = "py-2 px-4 rounded text-center text-[9px] font-black uppercase bg-gray-900 text-gray-600 tracking-widest";
            }
            renderChart();
        }

        function renderChart() {
            const ctx = document.getElementById('marketChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: globalMarketData.map(d => d.created_at),
                    datasets: [{
                        data: globalMarketData.map(d => d.price),
                        borderColor: '#222', borderWidth: 1.5, pointRadius: 2.2,
                        pointBackgroundColor: globalMarketData.map(d => {
                            if (strategies.sell.includes(d.risk_level)) return '#ef4444';
                            if (strategies.buy.includes(d.risk_level)) return '#10b981';
                            if (strategies.dca.includes(d.risk_level)) return '#3b82f6';
                            return '#222';
                        }),
                        pointBorderColor: 'rgba(0,0,0,0)', tension: 0.1
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#444', font: { size: 9 }, autoSkip: true, maxTicksLimit: 12 }, grid: { display: false } },
                        y: { position: 'right', grid: { color: '#0f0f0f' }, ticks: { color: '#444', font: { size: 10 } } }
                    }
                }
            });
        }
        init();
    </script>
</body>
</html>
