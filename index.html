<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaSignal Pro Cockpit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .card { background-color: #0f0f0f; border: 1px solid #1f1f1f; border-radius: 8px; }
        
        /* Button Styling */
        .btn-risk { 
            width: 32px; height: 32px; font-size: 10px; font-weight: 800; border-radius: 4px; 
            border: 1px solid #222; transition: all 0.2s; color: #444; background: transparent;
        }
        .btn-risk:hover { border-color: #444; color: #fff; }
        
        .active-buy { background-color: #10b981 !important; color: white !important; border-color: #10b981 !important; box-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }
        .active-dca { background-color: #3b82f6 !important; color: white !important; border-color: #3b82f6 !important; box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
        .active-sell { background-color: #ef4444 !important; color: white !important; border-color: #ef4444 !important; box-shadow: 0 0 10px rgba(239, 68, 68, 0.2); }
        
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: #1f1f1f; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col">
    <nav class="h-14 border-b border-gray-900 flex items-center justify-between px-6 bg-black shrink-0">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 px-2 py-1 rounded text-xs font-black italic">AS</div>
            <h2 class="text-xs font-bold tracking-[0.2em] text-gray-500 uppercase">AlphaSignal Cockpit</h2>
        </div>
        <select id="tickerSelect" class="bg-gray-900 border border-gray-800 text-[10px] font-bold uppercase p-2 rounded outline-none cursor-pointer">
            <option value="SPY">S&P 500 (SPY)</option>
            <option value="QQQ">Nasdaq 100 (QQQ)</option>
        </select>
    </nav>

    <main class="flex-1 flex overflow-hidden">
        <div class="w-[450px] p-8 bg-[#080808] overflow-y-auto sidebar flex flex-col gap-6 shrink-0 border-r border-gray-900">
            
            <div class="card p-6">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4">Current Market State</p>
                <div id="price" class="text-5xl font-black tracking-tighter mb-2">$0.00</div>
                <div id="riskDisplay" class="text-sm font-bold text-gray-400 mb-6">Risk Level: 0/10</div>
                <div id="risk-status" class="py-2 px-4 rounded text-center text-[10px] font-black uppercase tracking-widest bg-gray-900 text-gray-600">Initializing...</div>
            </div>

            <div class="card p-6">
                <h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-6 italic">Strategy Sandbox</h3>
                <div class="space-y-6">
                    <div>
                        <span class="text-[9px] font-black text-emerald-500 uppercase block mb-3">Heavy Buy Range</span>
                        <div id="buyRow" class="flex gap-1.5 justify-between"></div>
                    </div>
                    <div>
                        <span class="text-[9px] font-black text-blue-500 uppercase block mb-3">DCA Range</span>
                        <div id="dcaRow" class="flex gap-1.5 justify-between"></div>
                    </div>
                    <div>
                        <span class="text-[9px] font-black text-red-500 uppercase block mb-3">Sell Signal Range</span>
                        <div id="sellRow" class="flex gap-1.5 justify-between"></div>
                    </div>
                </div>
            </div>

            <div class="card p-6 border-dashed border-gray-800">
                <p class="text-[10px] font-bold text-gray-500 uppercase mb-4">Email Notifications</p>
                <input type="email" id="emailInput" placeholder="Enter email address..." class="w-full bg-black border border-gray-800 p-3 rounded text-xs mb-3 outline-none focus:border-blue-600 transition">
                <button onclick="saveAlertSettings()" class="w-full bg-white text-black font-black text-[10px] uppercase py-3 rounded hover:bg-gray-200 transition">Enable Alerts</button>
            </div>
        </div>

        <div class="flex-1 p-8 flex flex-col overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <h3 id="chartTitle" class="text-xl font-extrabold tracking-tight">Market History Analysis</h3>
                <div class="flex gap-4 text-[9px] font-black text-gray-700 uppercase tracking-widest">
                    <span><span class="text-emerald-500">●</span> Buy</span>
                    <span><span class="text-blue-500">●</span> DCA</span>
                    <span><span class="text-red-500">●</span> Sell</span>
                </div>
            </div>
            <div class="flex-1 relative">
                <canvas id="marketChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://zifpotfvosfvxwcuxkct.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InppZnBvdGZ2b3Nmdnh3Y3V4a2N0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNzE5MjgsImV4cCI6MjA5MTk0NzkyOH0.mZ2Ngng0ulUDjfK57SPYhds8wD1g4qfxVsWzzOD1p1o'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let chartInstance = null;
        let globalMarketData = [];
        let strategies = { buy: [1, 2, 3], dca: [4, 5, 6, 7], sell: [8, 9, 10] };

        function createButtons() {
            ['buy', 'dca', 'sell'].forEach(cat => {
                const container = document.getElementById(cat + 'Row');
                if (!container) return;
                container.innerHTML = '';
                for (let i = 1; i <= 10; i++) {
                    const btn = document.createElement('button');
                    btn.innerText = i;
                    const isActive = strategies[cat].includes(i);
                    btn.className = `btn-risk ${isActive ? 'active-' + cat : ''}`;
                    btn.onclick = () => toggleRisk(cat, i);
                    container.appendChild(btn);
                }
            });
        }

        function toggleRisk(cat, risk) {
            const alreadyInThisCategory = strategies[cat].includes(risk);
            
            // Remove from all regardless
            strategies.buy = strategies.buy.filter(r => r !== risk);
            strategies.dca = strategies.dca.filter(r => r !== risk);
            strategies.sell = strategies.sell.filter(r => r !== risk);
            
            // If it wasn't already in the category clicked, add it (Toggle ON)
            if (!alreadyInThisCategory) {
                strategies[cat].push(risk);
            }
            
            createButtons();
            updateUI();
        }

        async function init() {
            createButtons();
            const { data, error } = await supabaseClient
                .from('market_data')
                .select('*')
                .order('created_at', { ascending: true });

            if (data) {
                globalMarketData = data;
                updateUI();
            }
        }

        function updateUI() {
            if (globalMarketData.length === 0) return;
            const latest = globalMarketData[globalMarketData.length - 1];
            
            document.getElementById('price').innerText = `$${latest.price.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('riskDisplay').innerText = `Risk Level: ${latest.risk_level}/10`;
            
            const statusEl = document.getElementById('risk-status');
            if (strategies.sell.includes(latest.risk_level)) {
                statusEl.innerText = "SIGNAL: SELL"; 
                statusEl.className = "py-2 px-4 rounded text-center text-[10px] font-black uppercase bg-red-900/30 text-red-500";
            } else if (strategies.buy.includes(latest.risk_level)) {
                statusEl.innerText = "SIGNAL: HEAVY BUY"; 
                statusEl.className = "py-2 px-4 rounded text-center text-[10px] font-black uppercase bg-emerald-900/30 text-emerald-500";
            } else if (strategies.dca.includes(latest.risk_level)) {
                statusEl.innerText = "SIGNAL: DCA"; 
                statusEl.className = "py-2 px-4 rounded text-center text-[10px] font-black uppercase bg-blue-900/30 text-blue-500";
            } else {
                statusEl.innerText = "NO ACTIVE SIGNAL"; 
                statusEl.className = "py-2 px-4 rounded text-center text-[10px] font-black uppercase bg-gray-900 text-gray-600";
            }
            renderChart();
        }

        function renderChart() {
            const ctx = document.getElementById('marketChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: globalMarketData.map(d => d.created_at),
                    datasets: [{
                        data: globalMarketData.map(d => d.price),
                        borderColor: '#222', borderWidth: 1.5, pointRadius: 2.2,
                        pointBackgroundColor: globalMarketData.map(d => {
                            if (strategies.sell.includes(d.risk_level)) return '#ef4444';
                            if (strategies.buy.includes(d.risk_level)) return '#10b981';
                            if (strategies.dca.includes(d.risk_level)) return '#3b82f6';
                            return '#222';
                        }),
                        pointBorderColor: 'rgba(0,0,0,0)', tension: 0.1
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#333', font: { size: 9 }, autoSkip: true, maxTicksLimit: 12 }, grid: { display: false } },
                        y: { position: 'right', grid: { color: '#0f0f0f' }, ticks: { color: '#333', font: { size: 10 } } }
                    }
                }
            });
        }

        function saveAlertSettings() {
            alert("Email settings saved locally. Edge Function integration pending.");
        }

        init();
    </script>
</body>
</html>
